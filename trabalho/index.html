<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Lista</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <header>
        <div class="topo">

            <div class="logo">
                <img src="imgs/image.png" class="carrinho">
                <h1>Comercio.com</h1>
            </div>

            <div class="usuario">
                <span>Kamilly</span>
                <img src="imgs/perfil.png" class="foto-usuario">
            </div>

        </div>
    </header>

    <main>
        <div class="menu">
            <a href="#">Inicio</a>
            <a href="#">Inserir Item</a>
            <a href="#">Alterar Item</a>
            <a href="#">Excluir Item</a>
            <a href="#">Mostrar Item</a>
            <a href="#">Listar Todos</a>
        </div>

        <h2>Cadastrar Item</h2>

        <form id="taskForm">
            <input type="hidden" id="taskId">

            <p>Titulo</p>

            <input type="text" id="titulo">

            <p>Descricao</p>

            <textarea id="descricao"></textarea>

           
                <button>Salvar</button>
           

            <h2>Lista de Tarefas</h2>

            <table border="1">
                <tr>
                    <th>Titulo</th>
                    <th>Descricao</th>
                    <th>Acoes</th>
                </tr>
                <tbody id="taskList"></tbody>
            </table>

    </main>
    <footer class="footer">
        <p>Site criado por <a href="https://github.com/Kamiko-Hyakume" target="_blank">Kauana</a>,
            <a href="https://github.com/kamillybirkner" target="_blank">Kamilly</a>
            e <a href="https://github.com/marco-wolff">Marco</a>
        </p>
    </footer>
</body>

</html>
