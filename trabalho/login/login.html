<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilo/media-query.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!--Imagem-->
            </div>

            <div id="formulario">
                <h1>Login</h1>
                <p>Seja Bem-vindo(a). Faça seu login para acessar!</p>

                <form id="loginForm" autocomplete="on">
                    <div class="campo">
                        <span class="material-icons">person</span>
                        <input type="email" name="login" id="ilogin" placeholder="Seu email" autocomplete="email">
                    </div>

                    <div class="campo">
                        <span class="material-icons">vpn_key</span>
                        <input type="password" name="senha" id="isenha" placeholder="Sua senha">
                    </div>
                    <input type="submit" value="Entrar" class="botao">
                    <a href="esquecisenha.html" class="botao">Esqueci a senha <span
                            class="material-icons">mail</span></a>
                    <a href="cadastrar.html" class="botao">Não tem uma conta? Cadastre-se <span
                            class="material-icons">person_add</span></a>
                </form>

            </div>
        </section>
    </main>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();
            window.location.href = "../index.html";
        });
    </script>
</body>

</html>
