<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sistema simples de gerenciamento de itens com CRUDL para estudo de HTML, CSS e JavaScript">

    <link rel="stylesheet" href="style/style.css">

    <title>Comercio.com</title>
</head>

<body>

    <header class="header">

        <div class="topo">

            <a href="index.html" class="logo">
                <img src="imgs/image.png" alt="Logo do site">
            </a>

            <h1>Comercio.com</h1>

            <div class="usuario-logado">
                <img src="imgs/image.png" class="avatar" alt="Foto do usuário">
                <span id="nomeUsuario">Usuário</span>
            </div>
        </div>

        <nav>
            <ul class="menu">
                <li><a href="#">Início</a></li>

                <li>
                    <a href="#">Cadastrar</a>
                    <ul class="submenu">
                        <li><a href="#form">Inserir Item</a></li>
                    </ul>
                </li>

                <li>
                    <a href="#">Gerenciar</a>
                    <ul class="submenu">
                        <li><a href="#lista">Listar Todos</a></li>
                    </ul>
                </li>
            </ul>
        </nav>

    </header>

    <main class="main-content">

        <!-- FORM -->
        <section id="form" class="card">
            <h2>Cadastrar Item</h2>

            <form id="taskForm">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" required>

                <div class="field-group">
                    <input type="text" class="field-input" id="titulo" name="titulo" autocomplete="off" maxlength="100"
                        required>
                    <label class="field-label" for="titulo">Título *</label>
                </div>

                <div class="field-group">
                    <input type="text" class="field-input" id="codigo" name="codigo" autocomplete="off" maxlength="20"
                        required>
                    <label class="field-label" for="codigo">Código *</label>
                </div>

                <div class="field-group">
                    <select class="field-input field-select" id="categoria" name="categoria" required>
                        <!-- Removido o option placeholder para evitar texto duplicado com o floating label -->
                        <option value="" selected disabled hidden></option>

                        <option value="eletronicos">
                            Eletrônicos
                        </option>

                        <option value="roupas">
                            Roupas e Acessórios
                        </option>

                        <option value="alimentos">
                            Alimentos e Bebidas
                        </option>

                        <option value="moveis">
                            Móveis e Decoração
                        </option>

                        <option value="livros">
                            Livros e Mídia
                        </option>

                        <option value="esportes">
                            Esportes e Lazer
                        </option>

                        <option value="outros">
                            Outros
                        </option>

                    </select>

                    <label class="field-label" for="categoria">
                        Categoria *
                    </label>

                </div>

                <div class="field-group">
                    <input type="number" class="field-input" id="preco" name="preco" min="0.01" step="0.01"
                        autocomplete="off">
                    <label class="field-label" for="preco">Preço (R$) *</label>
                </div>

                <div class="field-group">
                    <textarea class="field-input field-textarea" id="descricao" name="descricao"
                        maxlength="500"></textarea>
                    <label class="field-label" for="descricao">Descrição *</label>
                </div>

                <div class="checkbox-section">

                    <span class="checkbox-section__label">
                        Canais de venda disponíveis
                    </span>

                    <div class="checkbox-group">

                        <div class="checkbox-item">
                            <input type="checkbox" id="loja_fisica" name="canais" value="loja_fisica">
                            <label for="loja_fisica">Loja Física</label>
                        </div>

                        <div class="checkbox-item">
                            <input type="checkbox" id="site" name="canais" value="site">
                            <label for="site">Site</label>
                        </div>

                        <div class="checkbox-item">
                            <input type="checkbox" id="app" name="canais" value="app">
                            <label for="app">Aplicativo</label>
                        </div>

                        <div class="checkbox-item">
                            <input type="checkbox" id="marketplace" name="canais" value="marketplace">
                            <label for="marketplace">Marketplace</label>
                        </div>

                    </div>

                </div>

                <input type="text" id="searchInput" placeholder="Pesquisar..." class="search-field">
            </div>

                    <button type="reset" id="botaoLimpar" class="btn btn-outlined">
                        Limpar
                    </button>

                    <button type="submit" id="botaoSalvar" class="btn btn-filled">
                        Salvar
                    </button>

                </div>
            <!-- TABLE -->
            <div class="table-container">
                <table class="data-table">

                    <thead>
                        <tr>
                            <th><input type="checkbox">
                            </th>
                            <th>Título</th>
                            <th>Descrição</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="taskList"></tbody>

                </table>
            </div>

            <!-- FOOTER -->
            <div class="table-footer">
                <span id="paginationInfo">0 itens</span>

                <div class="pagination">
                    <button id="prevPage">&lt;</button>
                    <button id="nextPage">&gt;</button>
                </div>
            </div>

        </section>

    </main>

    <footer class="footer">
        <p>
            Site criado por
            <a href="https://github.com/Kamiko-Hyakume" target="_blank">Kauana</a>,
            <a href="https://github.com/kamillybirkner" target="_blank">Kamilly</a>
            e <a href="https://github.com/marco-wolff" target="_blank">Marco</a>
        </p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
