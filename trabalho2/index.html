<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sistema simples de gerenciamento de itens com CRUDL para estudo de HTML, CSS e JavaScript">

    <link rel="stylesheet" href="style/style.css">

    <title>Comercio.com</title>
</head>

<body>

    <header class="header">

        <div class="topo">

            <a href="index.html" class="logo">
                <img src="imgs/image.png" alt="Logo do site">
            </a>

            <h1>Comercio.com</h1>

            <div class="usuario-logado">
                <img src="imgs/image.png" class="avatar" alt="Foto do usuário">
                <span id="nomeUsuario">Usuário</span>
            </div>

        </div>

        <nav>
            <ul class="menu">
                <li><a href="#">Início</a></li>

                <li>
                    <a href="#">Cadastrar</a>
                    <ul class="submenu">
                        <li><a href="#form">Inserir Item</a></li>
                    </ul>
                </li>

                <li>
                    <a href="#">Gerenciar</a>
                    <ul class="submenu">
                        <li><a href="#lista">Listar Todos</a></li>
                    </ul>
                </li>
            </ul>
        </nav>

    </header>

    <main class="main-content">

        <!-- FORM -->
        <section id="form" class="card">
            <h2>Cadastrar Item</h2>

            <form id="taskForm">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" required>

                <label for="descricao">Descrição</label>
                <textarea id="descricao" required></textarea>

                <button type="submit">Salvar</button>
                <button type="reset">Limpar</button>
            </form>
        </section>

        <!-- DATA TABLE -->
        <section id="lista" class="card material-table">

            <!-- HEADER -->
            <div class="table-header">
                <div>
                    <h2>Lista de Itens</h2>
                    <p class="table-subtitle">Itens cadastrados</p>
                </div>

                <input type="text" id="searchInput" placeholder="Pesquisar..." class="search-field">
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table class="data-table">

                    <thead>
                        <tr>
                            <th><input type="checkbox">
                            </th>
                            <th>Título</th>
                            <th>Descrição</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="taskList"></tbody>

                </table>
            </div>

            <!-- FOOTER -->
            <div class="table-footer">
                <span id="paginationInfo">0 itens</span>

                <div class="pagination">
                    <button id="prevPage">&lt;</button>
                    <button id="nextPage">&gt;</button>
                </div>
            </div>

        </section>

    </main>

    <footer class="footer">
        <p>
            Site criado por
            <a href="https://github.com/Kamiko-Hyakume" target="_blank">Kauana</a>,
            <a href="https://github.com/kamillybirkner" target="_blank">Kamilly</a>
            e <a href="https://github.com/marco-wolff" target="_blank">Marco</a>
        </p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
