<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilo/media-query.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <main>
        <section class="login-card">
            <div class="login-hero"></div>

            <div class="login-body">
                <h1>Login</h1>
                <p>Acesse sua conta para continuar.</p>

                <form id="loginForm" autocomplete="on" novalidate>
                    <fieldset>
                        <legend class="sr-only">Entrar na conta</legend>

                        <div class="campo-material">
                            <input
                                type="email"
                                name="email"
                                id="email"
                                placeholder=" "
                                autocomplete="email"
                                required
                            >
                            <label for="email">Seu e-mail</label>
                        </div>

                        <div class="campo-material">
                            <input
                                type="password"
                                name="password"
                                id="password"
                                placeholder=" "
                                autocomplete="current-password"
                                required
                                minlength="4"
                                maxlength="8"
                            >
                            <label for="password">Sua senha</label>
                        </div>

                        <div class="checkbox-material">
                            <input type="checkbox" id="lembrar">
                            <label for="lembrar">Lembrar-me</label>
                        </div>

                        <button type="submit" class="botao botao-primario">
                            <span>Entrar</span>
                        </button>

                        <a href="esquecisenha.html" class="botao botao-secundario">
                            <span>Esqueci a senha</span>
                            <span class="material-icons" aria-hidden="true">mail</span>
                        </a>

                        <a href="cadastrar.html" class="botao botao-secundario">
                            <span>Não tem uma conta? Cadastre-se</span>
                            <span class="material-icons" aria-hidden="true">person_add</span>
                        </a>
                    </fieldset>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
